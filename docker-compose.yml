version: '3.8'

services:
  db:
    image: neo4j:5
    container_name: ind_neo4j
    environment:
      - NEO4J_AUTH=${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-password123}
      - NEO4J_apoc_export_file_enabled=true
      - NEO4J_apoc_import_file_enabled=true
      - NEO4J_apoc_import_file_use__neo4j__config=true
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - ./data/neo4j/data:/data
      - ./data/neo4j/logs:/logs
      - ./data/neo4j/import:/var/lib/neo4j/import
      - ./data/neo4j/plugins:/plugins
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: rag_backend/Dockerfile
    container_name: ind_backend
    environment:
      - NEO4J_URI=neo4j://db:7687
      - NEO4J_USER=${NEO4J_USER:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-password123}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_EMBEDDING_API_KEY=${OPENAI_EMBEDDING_API_KEY}
      - OPENVIKING_LLM_API_KEY=${OPENVIKING_LLM_API_KEY}
      # 避免在宿主机运行产生冲突，向量库落在特定的卷或挂载目录中
      - CHROMA_DB_DIR=/app/output/chroma_db
    ports:
      - "8000:8000"
    volumes:
      # 挂载本地数据目录供自动导入
      - ./output:/app/output
      - ./ontology:/app/ontology
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: rag_frontend/Dockerfile
    container_name: ind_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
